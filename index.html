      margin: 0;

      overflow: hidden;
    }

<body>
<script>
'use strict';

// ══════════════════════════════════════════════════════════════════════════════
//  CONFIGURATION
// ══════════════════════════════════════════════════════════════════════════════

// ── Testing flag ──────────────────────────────────────────────────────────────
//  Set to true while piloting: short timings and only a handful of trials.
//  Set to false for the real experiment.
const TESTING = false;


const CFG = {
  // Stimulus
  DOT_NB:              160,
  CIRCLE_RADIUS:       280,
  DOT_RADIUS:          5.5,
  MIN_DIST_FACTOR:     2.5,   // min separation = DOT_RADIUS × factor

  // Equiluminant colours  (luminance ≈ 0.326)
  COLOR_RED:  '#E11C1C',
  COLOR_BLUE: '#0049D6',

  // Timing  (ms)  — near-zero in testing/simulation so you can click through quickly
  T_FIXATION:       TESTING ?    1 : 1000,
  T_FIXATION_SHORT: TESTING ?    1 :  500,
  T_INTER:          TESTING ?    1 :  300,
  T_INTER_LONG:     TESTING ?    1 :  750,
  T_BLANK:          TESTING ?    1 : 1220,
  TIME_DOTS:        TESTING ?  200 :  500,
  T_TIMEOUT:                                  7000,
  T_TOO_SLOW:       TESTING ?  200 : 1000,
  SPINNER_DURATION: TESTING ?  300 : 2000,

  // Trial counts
  NB_PRETESTS:       TESTING ?   4 :  100,
  NB_TESTS_PER_COND: TESTING ?   8 :  240,

  // QUEST+ accuracy targets
  TARGET_P_EASY:       0.84,
  TARGET_P_MEDIUM:     0.72,
  TARGET_P_HARD:       0.60,

  // Catch trials  (injected into test blocks only, not pretest)
  CATCH_DIFFERENCE:   120,                  // dot difference — 140 vs 20 dots, very obvious
  NB_CATCH_PER_BLOCK: TESTING ?  2 :  8,   // 2 per block in testing, 8 in real experiment
  CATCH_MIN_SPACING:  TESTING ?  2 : 20,   // minimum real trials between two catch trials

  // Attention warnings
  ATTN_STREAK_LIMIT:   20,   // warn after N consecutive same-key presses
  ATTN_RT_COUNT:        5,   // sliding window size for RT check
  ATTN_RT_LIMIT:       150,  // warn if all N recent RTs are below this (ms)

  // Canvas logical size  (pixels)
  CANVAS_W:            1200,
  CANVAS_H:             900,

  // Fixed experimental conditions
  RATING_TYPE:        'confidence',
};

// Canvas centre  (mirrors PsychoPy's (0,0) origin)
const CX = CFG.CANVAS_W / 2;   // 600
const CY = CFG.CANVAS_H / 2;   // 450

// (PsychoPy coordinate conversion: canvas_x = CX + x,  canvas_y = CY − y)


// ══════════════════════════════════════════════════════════════════════════════
//  PROLIFIC INTEGRATION  &  PARTICIPANT SETUP
// ══════════════════════════════════════════════════════════════════════════════

const urlParams         = new URLSearchParams(window.location.search);
const PROLIFIC_PID      = urlParams.get('PROLIFIC_PID')  || 'TEST';
const PROLIFIC_STUDY_ID = urlParams.get('STUDY_ID')      || 'TEST';
const PROLIFIC_SESSION  = urlParams.get('SESSION_ID')    || 'TEST';

// Arrow position: randomised per participant (1–4)
//   Position controls left arrow colour and left keep/change label:
//   1 → left=blue,  left=keep    3 → left=blue,  left=change
//   2 → left=red,   left=keep    4 → left=red,   left=change
const ARROWS_POSITION = Math.floor(Math.random() * 4) + 1;

function getLeftDotColor()   { return [1, 3].includes(ARROWS_POSITION) ? 'blue' : 'red'; }
function getLeftKeepChange() { return [1, 2].includes(ARROWS_POSITION) ? 'keep' : 'change'; }


// ══════════════════════════════════════════════════════════════════════════════
//  SHARED RUNTIME STATE
// ══════════════════════════════════════════════════════════════════════════════

const STATE = {
  q:        null,   // single QuestPlus instance, runs throughout pretest + task
  trialNum: 0,
};

// Per-trial handoff: dot trial → blank/slider → keep/change
const TRIAL_STATE = {
  timeout:          false,
  selectedColor:    null,
  otherGuessColor:  null,
  correctColor:     null,
  intensity:        null,
  difficulty:       null,
  condition:        null,
  agreeOrDisagree:  null,
  confidenceValue:  null,
  confidenceRT:     null,
};

// Attention check tracking (updated in DotPlugin after every key press)
const ATTENTION = {
  lastKey:       null,   // 'left' | 'right' — most recent arrow key pressed
  sameKeyStreak: 0,      // consecutive presses of the same key
  recentRTs:     [],     // sliding window of the last ATTN_RT_COUNT dot-trial RTs
  warningNeeded: false,  // true → show warning screen after current dot trial
  warningType:   null,   // 'streak' | 'rt'
};


// ══════════════════════════════════════════════════════════════════════════════
//  UTILITY: FISHER–YATES SHUFFLE  (in-place)
// ══════════════════════════════════════════════════════════════════════════════

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}


// ══════════════════════════════════════════════════════════════════════════════
//  QUEST+   (Bayesian adaptive Weibull staircase, 2AFC)
// ══════════════════════════════════════════════════════════════════════════════
//
//  Psychometric function:
//    p(correct | x, α, β) = γ + (1 − δ − γ) · (1 − exp(−(x/α)^β))
//  where  γ = 0.5  (2AFC chance),  δ = 0.02  (lapse rate)
//
//  Parameter space:
//    threshold α ∈ {1 … 100}  (100 values)
//    slope     β ∈ {1 … 9}    ( 9 values)
//
//  Stimulus domain:
//    intensity = the dot-count DIFFERENCE between majority and minority colour.
//    Only EVEN differences are physically realizable (the majority gets
//    +intensity/2 dots, the minority −intensity/2), so the domain is
//    {2, 4, … , DOT_NB−2}  (= 2 … 158 for DOT_NB = 160).  Using even values
//    guarantees every intensity QUEST+ proposes is a distinct stimulus.
//
//  next_stim() picks the stimulus that minimises expected posterior entropy.
//  update()    performs a Bayesian posterior update after each response.
// ══════════════════════════════════════════════════════════════════════════════

class QuestPlus {
  constructor() {
    this.gamma  = 0.5;
    this.delta  = 0.02;

    this.thresholds  = Array.from({ length: 100 }, (_, i) => i + 1);  // 1…100
    this.slopes      = Array.from({ length:  9 }, (_, i) => i + 1);  // 1…9
    // Even dot-differences only: {2, 4, … , DOT_NB−2}  (= 2 … 158 → 79 values)
    this.intensities = Array.from({ length: (CFG.DOT_NB - 2) >> 1 }, (_, i) => (i + 1) * 2);

    const nT = this.thresholds.length;   // 100
    const nS = this.slopes.length;       //   9

    // Uniform prior:  posterior[t][s]
    const uniform = 1 / (nT * nS);
    this.posterior = Array.from({ length: nT },
      () => new Float64Array(nS).fill(uniform)
    );

    // Precompute Weibull table:  pCorrect[t][s][xIdx]
    // Uses Float64Arrays for speed.
    this.pCorrect = Array.from({ length: nT }, (_, t) =>
      Array.from({ length: nS }, (_, s) =>
        new Float64Array(this.intensities.map(x =>
          this._weibull(x, this.thresholds[t], this.slopes[s])
        ))
      )
    );

    this.stimHistory     = [];
    this.responseHistory = [];
  }

  // ── Weibull psychometric function ────────────────────────────────
  _weibull(x, alpha, beta) {
    const p = this.gamma
      + (1 - this.delta - this.gamma) * (1 - Math.exp(-Math.pow(x / alpha, beta)));
    return Math.min(Math.max(p, 0), 1);
  }

  // ── Expected accuracy at intensity index xIdx ────────────────────
  //    Integrated over the current posterior.
  _expectedAccuracy(xIdx) {
    let acc = 0;
    for (let t = 0; t < this.thresholds.length; t++) {
      const post = this.posterior[t];
      const pRow = this.pCorrect[t];
      for (let s = 0; s < this.slopes.length; s++) {
        acc += post[s] * pRow[s][xIdx];
      }
    }
    return acc;
  }

  // ── Pick next stimulus (minimise expected posterior entropy) ─────
  nextStim() {
    let bestIdx    = 0;
    let minEntropy = Infinity;
    const nT = this.thresholds.length;
    const nS = this.slopes.length;

    for (let x = 0; x < this.intensities.length; x++) {
      const pC = this._expectedAccuracy(x);
      const pI = 1 - pC;
      let H = 0;

      for (let resp = 0; resp < 2; resp++) {
        const pResp = resp === 0 ? pC : pI;
        if (pResp < 1e-12) continue;

        // Pass 1: normalisation constant of the would-be posterior.
        // (Allocation-free — no temporary posterior is materialised.)
        let norm = 0;
        for (let t = 0; t < nT; t++) {
          const srcPost = this.posterior[t];
          const srcP    = this.pCorrect[t];
          for (let s = 0; s < nS; s++) {
            const lik = resp === 0 ? srcP[s][x] : (1 - srcP[s][x]);
            norm += srcPost[s] * lik;
          }
        }
        if (norm < 1e-300) continue;

        // Pass 2: Shannon entropy of the normalised posterior.
        let entropy = 0;
        for (let t = 0; t < nT; t++) {
          const srcPost = this.posterior[t];
          const srcP    = this.pCorrect[t];
          for (let s = 0; s < nS; s++) {
            const lik = resp === 0 ? srcP[s][x] : (1 - srcP[s][x]);
            const p   = (srcPost[s] * lik) / norm;
            if (p > 1e-15) entropy -= p * Math.log(p);
          }
        }

        H += pResp * entropy;
      }

      if (H < minEntropy) { minEntropy = H; bestIdx = x; }
    }

    return this.intensities[bestIdx];
  }

  // ── Bayesian posterior update ────────────────────────────────────
  update(intensity, correct) {
    this.stimHistory.push(intensity);
    this.responseHistory.push(correct);

    const xIdx = this.intensities.indexOf(intensity);
    let norm = 0;

    for (let t = 0; t < this.thresholds.length; t++) {
      const post = this.posterior[t];
      const pRow = this.pCorrect[t];
      for (let s = 0; s < this.slopes.length; s++) {
        const lik = correct ? pRow[s][xIdx] : (1 - pRow[s][xIdx]);
        post[s]  *= lik;
        norm     += post[s];
      }
    }

    // Normalise
    for (let t = 0; t < this.thresholds.length; t++) {
      const post = this.posterior[t];
      for (let s = 0; s < this.slopes.length; s++) post[s] /= norm;
    }
  }

  // ── Find intensity closest to a target accuracy ─────────────────
  getTargetIntensity(targetP) {
    if (this.stimHistory.length === 0) return null;
    let bestIdx  = 0;
    let bestDiff = Infinity;
    for (let x = 0; x < this.intensities.length; x++) {
      const diff = Math.abs(this._expectedAccuracy(x) - targetP);
      if (diff < bestDiff) { bestDiff = diff; bestIdx = x; }
    }
    return this.intensities[bestIdx];
  }

  // ── Deep-copy this instance into a new one ───────────────────────
  //    Used to seed the three independent instances from the shared posterior.
  clone() {
    const copy = new QuestPlus();
    copy.posterior        = this.posterior.map(row => new Float64Array(row));
    copy.stimHistory      = [...this.stimHistory];
    copy.responseHistory  = [...this.responseHistory];
    return copy;
  }

  // ── Posterior means of α and β — diagnostic only ────────────────
  getPosteriorMeans() {
    let meanAlpha = 0, meanBeta = 0;
    for (let t = 0; t < this.thresholds.length; t++) {
      for (let s = 0; s < this.slopes.length; s++) {
        meanAlpha += this.posterior[t][s] * this.thresholds[t];
        meanBeta  += this.posterior[t][s] * this.slopes[s];
      }
    }
    return { alpha: meanAlpha, beta: meanBeta };
  }

  // ── Return { easy, medium, hard } as THREE DISTINCT, ordered intensities ──
  //
  //  getTargetIntensity() alone can return the same (or out-of-order) value for
  //  two levels when the participant's psychometric function is very steep or
  //  their threshold is extreme — e.g. an exceptionally sensitive observer where
  //  even the smallest difference is already above the 84 % target.  That would
  //  collapse the design to fewer than three difficulty levels.
  //
  //  This method enforces  hard < medium < easy  with a minimum separation of
  //  one intensity step (2 dots), clamped to the valid stimulus range, so three
  //  genuinely distinct stimuli are ALWAYS produced.  When a target accuracy is
  //  unreachable the corresponding level saturates at the nearest valid extreme
  //  while still remaining distinct from its neighbours.
  getDifficulties() {
    if (this.stimHistory.length === 0) return null;

    const step = this.intensities[1] - this.intensities[0];          // 2
    const lo   = this.intensities[0];                                // 2
    const hi   = this.intensities[this.intensities.length - 1];      // 158

    let hard   = this.getTargetIntensity(CFG.TARGET_P_HARD);
    let medium = this.getTargetIntensity(CFG.TARGET_P_MEDIUM);
    let easy   = this.getTargetIntensity(CFG.TARGET_P_EASY);
    if (hard === null || medium === null || easy === null) return null;

    // 1. Push upward so each level is strictly above the previous one.
    medium = Math.max(medium, hard   + step);
    easy   = Math.max(easy,   medium + step);

    // 2. If the stack overflowed the top of the range, pull it back down,
    //    preserving the spacing from the top.
    if (easy > hi) {
      easy   = hi;
      medium = Math.min(medium, easy   - step);
      hard   = Math.min(hard,   medium - step);
    }

    // 3. If that pushed the bottom below the valid floor, lift the whole stack.
    if (hard < lo) {
      hard   = lo;
      medium = Math.max(medium, hard   + step);
      easy   = Math.max(easy,   medium + step);
    }

    return { easy, medium, hard };
  }
}


// ══════════════════════════════════════════════════════════════════════════════
//  DOT STIMULUS  –  generation & drawing
// ══════════════════════════════════════════════════════════════════════════════

/**
 * Generate dot positions inside a circle with minimum spacing.
 * Returns { xs, ys, colors } where colors[i] ∈ {'red','blue'}.
 */
function generateDots(correctColor, difference) {
  const half      = CFG.DOT_NB >> 1;
  const redCount  = correctColor === 'red'
    ? half + (difference >> 1)
    : half - (difference >> 1);
  const blueCount = CFG.DOT_NB - redCount;

  const minDist  = CFG.DOT_RADIUS * CFG.MIN_DIST_FACTOR;
  const effR     = CFG.CIRCLE_RADIUS - CFG.DOT_RADIUS * 1.5;
  const xs = [], ys = [];

  for (let i = 0; i < CFG.DOT_NB; i++) {
    let x, y;
    for (let attempt = 0; attempt < 1000; attempt++) {
      const angle  = Math.random() * 2 * Math.PI;
      const radius = effR * Math.sqrt(Math.random());
      x = radius * Math.cos(angle);
      y = radius * Math.sin(angle);
      const ok = xs.every((ox, j) => Math.hypot(x - ox, y - ys[j]) >= minDist);
      if (ok) break;
    }
    xs.push(x);
    ys.push(y);
  }

  // Build and shuffle color array
  const colors = [
    ...Array(redCount).fill('red'),
    ...Array(blueCount).fill('blue'),
  ];
  shuffle(colors);

  return { xs, ys, colors };
}

/**
 * Draw the fixation cross centred at canvas (cx, cy).
 */
function drawFixation(ctx, cx, cy) {
  ctx.save();
  ctx.strokeStyle = 'black';
  ctx.lineWidth   = 2.2;
  ctx.lineCap     = 'square';
  ctx.beginPath();
  ctx.moveTo(cx - 18, cy); ctx.lineTo(cx + 18, cy);
  ctx.moveTo(cx, cy - 18); ctx.lineTo(cx, cy + 18);
  ctx.stroke();
  ctx.restore();
}

/**
 * Draw the dot circle (and optionally the dots themselves).
 * @param {object} dots       – { xs, ys, colors }
 * @param {number[]} circlePos – [canvasX, canvasY] of circle centre
 * @param {boolean} showDots  – whether to render the dots
 */
function drawDotStimulus(ctx, dots, circlePos, showDots) {
  const [cx, cy] = circlePos;

  // Circle outline
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, CFG.CIRCLE_RADIUS, 0, 2 * Math.PI);
  ctx.strokeStyle = 'black';
  ctx.lineWidth   = 2;
  ctx.stroke();
  ctx.restore();

  if (!showDots) return;

  ctx.save();
  for (let i = 0; i < dots.xs.length; i++) {
    ctx.beginPath();
    // PsychoPy y is flipped relative to canvas
    ctx.arc(cx + dots.xs[i], cy - dots.ys[i], CFG.DOT_RADIUS, 0, 2 * Math.PI);
    ctx.fillStyle = dots.colors[i] === 'red' ? CFG.COLOR_RED : CFG.COLOR_BLUE;
    ctx.fill();
  }
  ctx.restore();
}

/**
 * Draw the left/right choice arrows and question text.
 * @param {string} leftColor – 'blue' | 'red'
 */
function drawArrows(ctx, leftColor) {
  const rightColor  = leftColor === 'blue' ? 'red' : 'blue';
  const leftLabel   = leftColor  === 'blue' ? 'BLUE DOTS' : 'RED DOTS';
  const rightLabel  = rightColor === 'red'  ? 'RED DOTS'  : 'BLUE DOTS';
  const leftHex     = leftColor  === 'blue' ? CFG.COLOR_BLUE : CFG.COLOR_RED;
  const rightHex    = rightColor === 'red'  ? CFG.COLOR_RED  : CFG.COLOR_BLUE;

  ctx.save();
  ctx.textAlign = 'center';

  // Question text  –  PsychoPy (0, −240) → canvas (CX, CY+240)
  ctx.fillStyle = 'black';
  ctx.font      = '28px Arial';
  ctx.fillText('I estimate there are more:', CX, CY + 240);

  // Left arrow + label  –  PsychoPy (−300, −300/−370)
  ctx.font      = 'bold 30px Arial';
  ctx.fillStyle = 'black';
  ctx.fillText(leftLabel, CX - 300, CY + 300);
  ctx.font      = 'bold 140px Arial';
  ctx.fillStyle = leftHex;
  ctx.fillText('←', CX - 300, CY + 400);

  // Right arrow + label  –  PsychoPy (300, −300/−370)
  ctx.font      = 'bold 30px Arial';
  ctx.fillStyle = 'black';
  ctx.fillText(rightLabel, CX + 300, CY + 300);
  ctx.font      = 'bold 140px Arial';
  ctx.fillStyle = rightHex;
  ctx.fillText('→', CX + 300, CY + 400);

  ctx.restore();
}

/**
 * White-fill the entire canvas.
 */
function clearCanvas(ctx) {
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, CFG.CANVAS_W, CFG.CANVAS_H);
}

/**
 * Create a canvas element sized to CFG.CANVAS_W × CFG.CANVAS_H.
 */
function makeCanvas() {
  const c    = document.createElement('canvas');
  c.width    = CFG.CANVAS_W;
  c.height   = CFG.CANVAS_H;
  c.style.cssText = `
    display:block; margin:0 auto;
    max-width:100vw; max-height:100vh;
    background:white;
  `;
  return c;
}

/**
 * Replace display_element content with a single canvas.
 * Returns { canvas, ctx }.
 */
function mountCanvas(display_element) {
  const canvas = makeCanvas();
  display_element.innerHTML = '';
  display_element.style.cssText =
    'display:flex;align-items:center;justify-content:center;' +
    'width:100%;min-height:100vh;background:white;';
  display_element.appendChild(canvas);
  return { canvas, ctx: canvas.getContext('2d') };
}


// ══════════════════════════════════════════════════════════════════════════════
//  CUSTOM JSPSYCH PLUGIN  –  DOT DISCRIMINATION TRIAL
// ══════════════════════════════════════════════════════════════════════════════
//
//  Trial sequence (within one call):
//    1. Fixation cross  (T_INTER_LONG ms)  at circle centre
//    2. Dots shown      (TIME_DOTS ms)     then hidden (circle outline stays)
//    3. Participant presses ← or →
//    4. Timeout after T_TIMEOUT ms → records "timeout"
//
//  Parameters (passed via the timeline object):
//    correctColor     'red' | 'blue'
//    questDriven      true → call STATE.q.nextStim()  (adaptive pretest trials)
//                     false → look up STATE.difficulties[difficulty]
//    difficulty       'easy' | 'medium' | 'hard' | 'quest+'
//    agreeOrDisagree  'agree' | 'disagree'  (determines other-participant colour)
//    trialType        'pretest' | 'control' | 'confidence'
// ══════════════════════════════════════════════════════════════════════════════

class DotPlugin {
  constructor(jsPsych) { this.jsPsych = jsPsych; }

  trial(display_element, trial) {
    const { canvas, ctx } = mountCanvas(display_element);

    // ── Resolve stimulus intensity ──────────────────────────────────
    let intensity;
    if (trial.trialType === 'demo') {
      intensity = 80;                         // large obvious difference for demonstration
    } else if (trial.questDriven) {
      intensity = STATE.q.nextStim();         // adaptive pretest trial — entropy-minimising
    } else if (trial.isCatch) {
      intensity = CFG.CATCH_DIFFERENCE;       // fixed large difference — should be obvious
    } else {
      // Test blocks: re-estimate the THREE difficulty intensities together on
      // every trial from the current posterior, guaranteeing they stay distinct
      // and correctly ordered (hard < medium < easy).
      const diffs = STATE.q.getDifficulties();
      intensity = diffs ? diffs[trial.difficulty] : STATE.q.nextStim();
    }

    const correctColor  = typeof trial.correctColor === 'function'
      ? trial.correctColor()
      : trial.correctColor;
    const leftDotColor  = getLeftDotColor();
    const rightDotColor = leftDotColor === 'blue' ? 'red' : 'blue';
    const dots          = generateDots(correctColor, intensity);

    // Circle centre  –  PsychoPy (0, 100) → canvas (CX, CY−100)
    const CIRCLE_POS = [CX, CY - 100];

    let startTime = null;
    let rafId     = null;
    let finished  = false;

    // ── Animation loop ──────────────────────────────────────────────
    const render = (ts) => {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;

      clearCanvas(ctx);

      const fixDur = trial.fixationDuration !== undefined ? trial.fixationDuration : CFG.T_INTER_LONG;
      if (elapsed < fixDur) {
        // Phase 1: fixation only
        drawFixation(ctx, CIRCLE_POS[0], CIRCLE_POS[1]);
      } else {
        // Phase 2: stimulus
        const stimElapsed = elapsed - fixDur;
        const dotsDur     = trial.dotsDuration !== undefined ? trial.dotsDuration : CFG.TIME_DOTS;
        const showDots    = stimElapsed < dotsDur;

        drawDotStimulus(ctx, dots, CIRCLE_POS, showDots);
        drawArrows(ctx, leftDotColor);

        // ── Timeout ──────────────────────────────────────────────────
        if (stimElapsed >= CFG.T_TIMEOUT && !finished) {
          finished = true;
          document.removeEventListener('keydown', handleKey);
          cancelAnimationFrame(rafId);

          clearCanvas(ctx);
          ctx.fillStyle = 'black';
          ctx.font      = '42px Arial';
          ctx.textAlign = 'center';
          ctx.fillText('Too slow!', CX, CY);

          TRIAL_STATE.timeout         = true;
          ATTENTION.warningNeeded     = false;  // don't carry a stale warning over

          setTimeout(() => {
            this.jsPsych.finishTrial({
              condition:           trial.trialType,
              trial_num:           ++STATE.trialNum,
              is_catch:            trial.isCatch || false,
              trial_difficulty:    trial.isCatch ? 'catch' : (trial.difficulty || 'quest+'),
              current_difference:  intensity,
              correct_color:       correctColor,
              left_color:          leftDotColor,
              right_color:         rightDotColor,
              timeout:             true,
            });
          }, CFG.T_TOO_SLOW);
          return;
        }
      }

      if (!finished) rafId = requestAnimationFrame(render);
    };

    // ── Key handler ─────────────────────────────────────────────────
    const handleKey = (e) => {
      if (finished) return;
      if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;

      // Block keypresses during fixation, and also before the first rAF frame
      // has fired (startTime === null) to avoid a race-condition RT of 0.
      const now = performance.now();
      const fixDur = trial.fixationDuration !== undefined ? trial.fixationDuration : CFG.T_INTER_LONG;
      if (!startTime || (now - startTime) < fixDur) return;

      finished = true;
      document.removeEventListener('keydown', handleKey);
      cancelAnimationFrame(rafId);

      const rt            = startTime !== null
        ? Math.round((now - startTime) - fixDur)
        : 0;
      const selectedColor = e.key === 'ArrowLeft' ? leftDotColor : rightDotColor;
      const correct       = selectedColor === correctColor;
      const firstArrow    = e.key === 'ArrowLeft' ? 'left' : 'right';

      // Update QUEST+ — skip for catch and demo trials
      if (!trial.isCatch && trial.trialType !== 'demo') {
        STATE.q.update(intensity, correct);
      }

      // ── Debug accuracy logging ──────────────────────────────────────
      if (!trial.isCatch && trial.trialType !== 'pretest' && trial.trialType !== 'demo') {
        const _key = `${trial.trialType}_${trial.difficulty}`;
        if (!_dbg[_key]) _dbg[_key] = { n: 0, correct: 0 };
        _dbg[_key].n++;
        _dbg[_key].correct += correct ? 1 : 0;
        if (_dbg[_key].n > 1) {
          const _pct = (_dbg[_key].correct / _dbg[_key].n * 100).toFixed(1);
          console.log(`[ACC] ${trial.trialType} / ${trial.difficulty}: ${_pct}%  (n = ${_dbg[_key].n})`);
        }
      }

      // ── Attention tracking ──────────────────────────────────────────
      // 1. Same-key streak (all trial types)
      if (firstArrow === ATTENTION.lastKey) {
        ATTENTION.sameKeyStreak++;
      } else {
        ATTENTION.sameKeyStreak = 1;
        ATTENTION.lastKey = firstArrow;
      }

      // 2. Fast-RT window (test trials only — pretest/demo/catch excluded)
      if (!trial.isCatch && trial.trialType !== 'pretest' && trial.trialType !== 'demo') {
        ATTENTION.recentRTs.push(rt);
        if (ATTENTION.recentRTs.length > CFG.ATTN_RT_COUNT) ATTENTION.recentRTs.shift();
      }

      const streakWarn = ATTENTION.sameKeyStreak >= CFG.ATTN_STREAK_LIMIT;
      const rtWarn     = ATTENTION.recentRTs.length >= CFG.ATTN_RT_COUNT &&
                         ATTENTION.recentRTs.every(r => r < CFG.ATTN_RT_LIMIT);

      if (streakWarn || rtWarn) {
        ATTENTION.warningNeeded = true;
        ATTENTION.warningType   = streakWarn ? 'streak' : 'rt';
        ATTENTION.sameKeyStreak = 0;   // reset so we don't warn every trial
        ATTENTION.recentRTs     = [];
      } else {
        ATTENTION.warningNeeded = false;
        ATTENTION.warningType   = null;
      }

      const agreeOrDisagree = trial.agreeOrDisagree;
      const otherGuessColor = !agreeOrDisagree ? null
        : agreeOrDisagree === 'correct'  ? correctColor                          // always the majority colour
        : agreeOrDisagree === 'agree'    ? selectedColor                         // mirrors participant
        :                                  (selectedColor === 'red' ? 'blue' : 'red'); // opposes participant

      // Handoff to next trial
      Object.assign(TRIAL_STATE, {
        timeout:         false,
        selectedColor,
        otherGuessColor,
        correctColor,
        intensity,
        difficulty:      trial.difficulty || 'quest+',
        condition:       trial.trialType,
        agreeOrDisagree,
        confidenceValue: null,
        confidenceRT:    null,
      });

      this.jsPsych.finishTrial({
        trial_type:          trial.trialType,
        trial_num:           ++STATE.trialNum,
        is_catch:            trial.isCatch || false,
        trial_difficulty:    trial.isCatch ? 'catch' : (trial.difficulty || 'quest+'),
        current_difference:  intensity,
        correct_color:       correctColor,
        selected_color:      selectedColor,
        accuracy:            correct ? 1 : 0,
        first_guess_arrow:   firstArrow,
        left_color:          leftDotColor,
        right_color:         rightDotColor,
        reaction_time_dots:  rt,
        agreement:           agreeOrDisagree,
        other_guess_color:   otherGuessColor,
        timeout:             false,
      });
    };

    document.addEventListener('keydown', handleKey);
    rafId = requestAnimationFrame(render);

  }
}
DotPlugin.info = { name: 'dot-plugin', parameters: {} };


// ══════════════════════════════════════════════════════════════════════════════
//  CUSTOM JSPSYCH PLUGIN  –  CONFIDENCE SLIDER
// ══════════════════════════════════════════════════════════════════════════════
//
//  Displays a vertical slider.  Participant moves the mouse over the bar
//  and clicks to confirm.  Returns { confidence_value, confidence_reaction_time }.
// ══════════════════════════════════════════════════════════════════════════════

class SliderPlugin {
  constructor(jsPsych) { this.jsPsych = jsPsych; }

  trial(display_element) {
    const { canvas, ctx } = mountCanvas(display_element);
    document.body.style.cursor = '';   // show cursor for slider interaction

    // Slider geometry  (PsychoPy: pos=(0,−50), w=140, h=600)
    //   Centre in canvas:  (CX, CY+50)
    const barCX     = CX;
    const barCY     = CY + 50;
    const barW      = 140;
    const barH      = 600;
    const barTop    = barCY - barH / 2;   //  CY − 250  = 200
    const barBottom = barCY + barH / 2;   //  CY + 350  = 800

    // Likert labels (by score range 0–100)
    const LIKERT = [
      { min: 80, label: 'Very confident' },
      { min: 60, label: 'Fairly confident' },
      { min: 40, label: 'Moderately confident' },
      { min: 20, label: 'Slightly confident' },
      { min:  0, label: 'Not at all confident' },
    ];

    let mouseCanvasX = barCX;
    let mouseCanvasY = barCY;
    let finished     = false;
    const startTime  = performance.now();

    const draw = () => {
      clearCanvas(ctx);

      // Instruction text  –  PsychoPy (0, 350) → canvas (CX, CY−350)
      ctx.save();
      ctx.fillStyle = 'black';
      ctx.font      = '34px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Your confidence level is:', CX, CY - 350);

      // Slider bar (white fill + black border)
      ctx.fillStyle   = 'white';
      ctx.fillRect(barCX - barW / 2, barTop, barW, barH);
      ctx.strokeStyle = 'black';
      ctx.lineWidth   = 2;
      ctx.strokeRect(barCX - barW / 2, barTop, barW, barH);

      // Endpoint labels
      ctx.font = '26px Arial';
      ctx.fillStyle = 'black';
      ctx.fillText('Very confident',      barCX, barTop  - 18);
      ctx.fillText('Not at all confident', barCX, barBottom + 38);

      // Mouse inside bar?
      const inside = (
        mouseCanvasX >= barCX - barW / 2 &&
        mouseCanvasX <= barCX + barW / 2 &&
        mouseCanvasY >= barTop &&
        mouseCanvasY <= barBottom
      );

      if (inside) {
        const cy  = Math.max(barTop, Math.min(barBottom, mouseCanvasY));
        const val = Math.round((barBottom - cy) / barH * 100);

        // Indicator line
        ctx.fillStyle = 'black';
        ctx.fillRect(barCX - 50, cy - 2.5, 100, 5);

        // Likert label to the right of the bar
        const entry = LIKERT.find(l => val >= l.min) || LIKERT[LIKERT.length - 1];
        ctx.font      = '22px Arial';
        ctx.textAlign = 'left';
        ctx.fillStyle = 'black';
        ctx.fillText(entry.label, barCX + barW / 2 + 20, cy + 8);
      }

      ctx.restore();
    };

    // ── Convert page-mouse → canvas coordinates ─────────────────────
    const toCanvasCoords = (e) => {
      const rect   = canvas.getBoundingClientRect();
      const scaleX = CFG.CANVAS_W / rect.width;
      const scaleY = CFG.CANVAS_H / rect.height;
      return [
        (e.clientX - rect.left) * scaleX,
        (e.clientY - rect.top)  * scaleY,
      ];
    };

    const handleMove = (e) => {
      [mouseCanvasX, mouseCanvasY] = toCanvasCoords(e);
      draw();
    };

    const handleClick = (e) => {
      if (finished) return;
      const [cx, cy] = toCanvasCoords(e);
      const inside   = (
        cx >= barCX - barW / 2 && cx <= barCX + barW / 2 &&
        cy >= barTop && cy <= barBottom
      );
      if (!inside) return;

      finished = true;
      canvas.removeEventListener('mousemove', handleMove);
      canvas.removeEventListener('click',     handleClick);
      document.body.style.cursor = 'none';  // hide cursor again after rating

      const clampY = Math.max(barTop, Math.min(barBottom, cy));
      const val    = Math.round((barBottom - clampY) / barH * 100);
      const rt     = Math.round(performance.now() - startTime);

      TRIAL_STATE.confidenceValue = val;
      TRIAL_STATE.confidenceRT    = rt;

      this.jsPsych.finishTrial({
        confidence_value:         val,
        confidence_reaction_time: rt,
      });
    };

    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('click',     handleClick);
    canvas.style.cursor = 'crosshair';
    draw(); // initial render

  }
}
SliderPlugin.info = { name: 'slider-plugin', parameters: {} };


// ══════════════════════════════════════════════════════════════════════════════
//  CUSTOM JSPSYCH PLUGIN  –  KEEP / CHANGE
// ══════════════════════════════════════════════════════════════════════════════
//
//  Shows participant's initial decision and the other participant's response.
//  Participant presses ← or → to keep or change.
// ══════════════════════════════════════════════════════════════════════════════

class KeepChangePlugin {
  constructor(jsPsych) { this.jsPsych = jsPsych; }

  trial(display_element) {
    // Safety: skip if the preceding dot trial timed out
    if (TRIAL_STATE.timeout) {
      this.jsPsych.finishTrial({ skipped: true, trial_label: 'keep_change_skipped' });
      return;
    }

    const { canvas, ctx } = mountCanvas(display_element);

    const leftKC   = getLeftKeepChange();             // 'keep' | 'change'
    const rightKC  = leftKC === 'keep' ? 'change' : 'keep';
    const selColor = TRIAL_STATE.selectedColor;
    const othColor = TRIAL_STATE.otherGuessColor;

    const selHex   = selColor === 'blue' ? CFG.COLOR_BLUE : CFG.COLOR_RED;
    const othHex   = othColor === 'blue' ? CFG.COLOR_BLUE : CFG.COLOR_RED;
    const selLabel = selColor === 'blue' ? 'BLUE' : 'RED';
    const othLabel = othColor === 'blue' ? 'BLUE' : 'RED';

    // ── Draw the screen (static) ────────────────────────────────────
    clearCanvas(ctx);
    ctx.save();
    ctx.textAlign = 'center';

    // "YOUR DECISION WAS:"  –  PsychoPy (0, 350) → canvas (CX, CY−350)
    ctx.fillStyle = 'black';
    // Both blocks centred around the fixation-cross position (CY − 100).
    const FIX_Y = CY - 100;

    // ── Your decision (above fixation) ───────────────────────────────
    ctx.font      = 'bold 34px Arial';
    ctx.fillText('YOUR DECISION WAS:', CX, FIX_Y - 155);

    ctx.fillStyle = selHex;
    ctx.font      = 'bold 54px Arial';
    ctx.fillText(selLabel, CX, FIX_Y - 75);

    // ── Other participant's decision (below fixation) ─────────────────
    ctx.fillStyle = 'black';
    ctx.font      = 'bold 30px Arial';
    ctx.fillText("OTHER PARTICIPANT'S DECISION:", CX, FIX_Y + 75);

    ctx.fillStyle = othHex;
    ctx.font      = 'bold 54px Arial';
    ctx.fillText(othLabel, CX, FIX_Y + 155);

    // Left arrow  –  PsychoPy (−200, −160/−250) → canvas (CX−200, CY+160/250)
    ctx.fillStyle = 'black';
    ctx.font      = 'bold 36px Arial';
    ctx.fillText(leftKC.toUpperCase(), CX - 200, CY + 165);
    ctx.font      = '110px Arial';
    ctx.fillText('←', CX - 200, CY + 270);

    // Right arrow
    ctx.font      = 'bold 36px Arial';
    ctx.fillText(rightKC.toUpperCase(), CX + 200, CY + 165);
    ctx.font      = '110px Arial';
    ctx.fillText('→', CX + 200, CY + 270);

    ctx.restore();

    const startTime = performance.now();

    const handleKey = (e) => {
      if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
      document.removeEventListener('keydown', handleKey);

      const rt       = Math.round(performance.now() - startTime);
      const decision = e.key === 'ArrowLeft' ? leftKC : rightKC;
      const finalColor = decision === 'keep'
        ? TRIAL_STATE.selectedColor
        : (TRIAL_STATE.selectedColor === 'red' ? 'blue' : 'red');
      const correct2nd = finalColor === TRIAL_STATE.correctColor;

      this.jsPsych.finishTrial({
        trial_label:               'keep_change',
        second_guess_decision:     decision,
        second_guess_arrow:        e.key === 'ArrowLeft' ? 'left' : 'right',
        second_guess_color:        finalColor,
        second_guess_accuracy:     correct2nd ? 1 : 0,
        second_guess_reaction_time: rt,
        left_opinion:              leftKC,
        right_opinion:             rightKC,
        confidence_value:          TRIAL_STATE.confidenceValue,
        confidence_reaction_time:  TRIAL_STATE.confidenceRT,
        // Echo key dot-trial fields so every row is self-contained
        selected_color:            TRIAL_STATE.selectedColor,
        other_guess_color:         TRIAL_STATE.otherGuessColor,
        agreement:                 TRIAL_STATE.agreeOrDisagree,
        condition:                 TRIAL_STATE.condition,
        trial_difficulty:          TRIAL_STATE.difficulty,
        current_difference:        TRIAL_STATE.intensity,
        correct_color:             TRIAL_STATE.correctColor,
      });
    };

    document.addEventListener('keydown', handleKey);

  }
}
KeepChangePlugin.info = { name: 'keep-change-plugin', parameters: {} };


// ══════════════════════════════════════════════════════════════════════════════
//  LOADING SPINNER  (4 s animated canvas)
// ══════════════════════════════════════════════════════════════════════════════

function makeSpinnerTrial() {
  return {
    type: jsPsychCallFunction,
    async: true,
    func: function (done) {
      const { canvas, ctx } = mountCanvas(document.querySelector('.jspsych-content'));
      const n      = 13;
      const r      = 40;
      const dotR   = 6;
      const dur    = CFG.SPINNER_DURATION;
      const start  = performance.now();
      let   rafId  = null;

      const frame = (ts) => {
        const elapsed = ts - start;
        if (elapsed >= dur) {
          cancelAnimationFrame(rafId);
          done();
          return;
        }

        clearCanvas(ctx);
        const t = elapsed / 1000;

        // Spinning dots
        ctx.save();
        for (let i = 0; i < n; i++) {
          const angle   = (2 * Math.PI * i / n) + t * 3.5;
          const alpha   = 0.2 + 0.8 * ((i / n));
          const x       = CX + r * Math.cos(angle);
          const y       = CY + r * Math.sin(angle);
          ctx.globalAlpha = alpha;
          ctx.beginPath();
          ctx.arc(x, y, dotR, 0, 2 * Math.PI);
          ctx.fillStyle = 'black';
          ctx.fill();
        }
        ctx.restore();

        // Message
        ctx.fillStyle = 'black';
        ctx.font      = '26px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Retrieving responses from other participants…', CX, CY + 100);

        rafId = requestAnimationFrame(frame);
      };

      rafId = requestAnimationFrame(frame);
    },
  };
}


// ══════════════════════════════════════════════════════════════════════════════
//  ATTENTION HELPERS
// ══════════════════════════════════════════════════════════════════════════════

function resetAttention() {
  ATTENTION.lastKey       = null;
  ATTENTION.sameKeyStreak = 0;
  ATTENTION.recentRTs     = [];
  ATTENTION.warningNeeded = false;
  ATTENTION.warningType   = null;
}

/**
 * Returns a FRESH warning trial object each time it is called.
 * Must NOT be reused — jsPsych 7 tracks node identity internally,
 * so sharing one object across multiple timeline positions breaks
 * the conditional_function after the first trigger.
 */
function makeWarningTrial() {
  return {
    timeline: [{
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function () {
        if (ATTENTION.warningType === 'streak') {
          return `<div style="${S.wrap}">
            <h1>⚠ Please pay attention</h1>
            <p>We noticed you pressed the same key
               <strong>${CFG.ATTN_STREAK_LIMIT} times in a row</strong>.</p>
            <p>Please look carefully at each dot cloud before responding —
               the majority colour changes on every trial.</p>
            <p style="${S.hint}">Press <strong>SPACE</strong> to continue.</p>
          </div>`;
        }
        return `<div style="${S.wrap}">
          <h1>⚠ Please slow down</h1>
          <p>We noticed ${CFG.ATTN_RT_COUNT} consecutive responses
             under <strong>${CFG.ATTN_RT_LIMIT} ms</strong> — faster than
             it is possible to process the image.</p>
          <p>Please take a moment to look at the dots carefully
             before pressing a key.</p>
          <p style="${S.hint}">Press <strong>SPACE</strong> to continue.</p>
        </div>`;
      },
      choices:   [' '],
      data:      { trial_label: 'attention_warning' },
      on_finish: function () {
        ATTENTION.warningNeeded = false;
        ATTENTION.warningType   = null;
      },
    }],
    conditional_function: () => ATTENTION.warningNeeded && !TRIAL_STATE.timeout,
  };
}


// ══════════════════════════════════════════════════════════════════════════════
//  TRIAL LIST BUILDERS
// ══════════════════════════════════════════════════════════════════════════════

/** NB_PRETESTS adaptive pretest trials, all driven by nextStim(). */
function buildPretestTrials() {
  const N    = CFG.NB_PRETESTS;
  const half = N >> 1;
  const colors = shuffle([...Array(half).fill('blue'), ...Array(N - half).fill('red')]);
  return colors.map(color => ({
    type:             DotPlugin,
    correctColor:     color,
    questDriven:      true,
    difficulty:       'quest+',
    trialType:        'pretest',
    agreeOrDisagree:  null,
    fixationDuration: 1500,
  }));
}

/**
 * Pick N catch-trial insertion positions from 0…total-1, spaced at least minSpacing apart.
 * Returns a Set of indices.
 */
function getCatchPositions(total, count, minSpacing) {
  const positions = new Set();
  let attempts = 0;
  while (positions.size < count && attempts < 50000) {
    const pos       = Math.floor(Math.random() * total);
    const tooClose  = [...positions].some(p => Math.abs(p - pos) < minSpacing);
    if (!tooClose) positions.add(pos);
    attempts++;
  }
  return positions;
}

/** N regular trials + NB_CATCH_PER_BLOCK additional catch trials, interleaved. */
function buildTestTrials(condition) {
  const N = CFG.NB_TESTS_PER_COND;

  // Fully-crossed color × agreement × difficulty.
  // For N=240: 2 × 2 × 3 = 12 cells × 20 reps = 240 — perfectly balanced.
  // For TESTING (N=8, not divisible by 12): perCell=0, remainder filled with a
  // simple pattern — only used during development, not real data collection.
  const perCell = Math.floor(N / 12);
  const specs   = [];
  for (const color of ['blue', 'red']) {
    for (const agree of ['agree', 'disagree']) {
      for (const diff of ['easy', 'medium', 'hard']) {
        for (let k = 0; k < perCell; k++) specs.push({ color, agree, diff });
      }
    }
  }
  // Fill any remainder (TESTING mode only)
  const _c = ['blue','red'], _a = ['agree','disagree'], _d = ['easy','medium','hard'];
  for (let i = specs.length; i < N; i++)
    specs.push({ color: _c[i%2], agree: _a[i%2], diff: _d[i%3] });
  shuffle(specs);

  // Helper: build the jsPsych sub-trials for one trial group
  function makeTrialGroup(correctColor, agreeOrDisagree, difficulty, isCatch) {
    const group = [];

    // ── 1. Dot trial ────────────────────────────────────────────────
    group.push({
      type:            DotPlugin,
      correctColor,
      questDriven:     false,
      isCatch,
      difficulty,
      agreeOrDisagree,
      trialType:       condition,
    });

    // ── 1b. Attention warning (fresh object each time — see makeWarningTrial)
    group.push(makeWarningTrial());

    // ── 2. Confidence slider  OR  1.22 s blank ─────────────────────
    if (condition === 'confidence') {
      group.push({
        timeline: [{ type: SliderPlugin }],
        conditional_function: () => !TRIAL_STATE.timeout,
      });
    } else {
      // Canvas-drawn fixation so it sits at exactly the same position
      // as the dot-trial fixation cross  (CX, CY − 100).
      group.push({
        timeline: [{
          type:  jsPsychCallFunction,
          async: true,
          func:  function (done) {
            const el  = document.querySelector('.jspsych-content') || document.body;
            const { ctx } = mountCanvas(el);
            clearCanvas(ctx);
            drawFixation(ctx, CX, CY - 100);
            setTimeout(done, CFG.T_BLANK);
          },
          data: { trial_label: 'fixation_control' },
        }],
        conditional_function: () => !TRIAL_STATE.timeout,
      });
    }

    // ── 4. Keep / change ────────────────────────────────────────────
    group.push({
      timeline: [{ type: KeepChangePlugin }],
      conditional_function: () => !TRIAL_STATE.timeout,
    });

    // ── 5. 250 ms post-trial blank ──────────────────────────────────
    group.push({
      timeline: [{
        type:           jsPsychHtmlKeyboardResponse,
        stimulus:       '<div style="background:white;width:100vw;height:100vh;"></div>',
        choices:        'NO_KEYS',
        trial_duration: 250,
        data:           { trial_label: 'blank_post' },
      }],
      conditional_function: () => !TRIAL_STATE.timeout,
    });

    return group;
  }

  // Build N regular trial groups
  const regularGroups = [];
  for (let i = 0; i < N; i++) {
    regularGroups.push(makeTrialGroup(specs[i].color, specs[i].agree, specs[i].diff, false));
  }

  // Build NB_CATCH_PER_BLOCK additional catch trial groups.
  // Peer always agrees (i.e. shows the correct color) so that failing a catch
  // trial is an unambiguous sign of inattention.
  const catchColors = shuffle([
    ...Array(CFG.NB_CATCH_PER_BLOCK >> 1).fill('blue'),
    ...Array(CFG.NB_CATCH_PER_BLOCK - (CFG.NB_CATCH_PER_BLOCK >> 1)).fill('red'),
  ]);
  const catchGroups = [];
  for (let i = 0; i < CFG.NB_CATCH_PER_BLOCK; i++) {
    catchGroups.push(makeTrialGroup(catchColors[i], 'correct', 'catch', true));
  }

  // Pick insertion positions (0 = before first regular trial, N = after last).
  // Spacing is enforced in terms of the gap between insertion points, which
  // equals the number of regular trials between consecutive catch trials.
  const insertPositions = [...getCatchPositions(N + 1, CFG.NB_CATCH_PER_BLOCK, CFG.CATCH_MIN_SPACING)]
    .sort((a, b) => a - b);

  // Interleave: walk through regular groups and splice in catch groups
  const trials = [];
  let catchIdx = 0;
  for (let i = 0; i <= N; i++) {
    while (catchIdx < insertPositions.length && insertPositions[catchIdx] === i) {
      trials.push(...catchGroups[catchIdx]);
      catchIdx++;
    }
    if (i < N) trials.push(...regularGroups[i]);
  }

  return trials;
}


// ══════════════════════════════════════════════════════════════════════════════
//  DEBUG LOGGING
// ══════════════════════════════════════════════════════════════════════════════

// Running accuracy counters per condition × difficulty.
// Key format: "control_easy", "confidence_medium", etc.
const _dbg = {};

function _logAccuracy(data) {
  // Only dot trials in test blocks that completed without timeout
  if (!data.condition || data.condition === 'pretest' || data.condition === 'demo') return;
  if (data.is_catch || data.timeout) return;
  if (data.accuracy === undefined || !data.trial_difficulty || data.trial_difficulty === 'quest+') return;

  const key = `${data.condition}_${data.trial_difficulty}`;
  if (!_dbg[key]) _dbg[key] = { n: 0, correct: 0 };
  _dbg[key].n++;
  _dbg[key].correct += data.accuracy;

  if (_dbg[key].n > 1) {
    const pct = (_dbg[key].correct / _dbg[key].n * 100).toFixed(1);
    console.log(`[ACC] ${data.condition} / ${data.trial_difficulty}: ${pct}%  (n = ${_dbg[key].n})`);
  }
}


// ══════════════════════════════════════════════════════════════════════════════
//  INSTRUCTION SCREEN HELPER
// ══════════════════════════════════════════════════════════════════════════════

// Inline styles — immune to any platform CSS overrides
const S = {
  wrap:  'width:100%;max-width:800px;box-sizing:border-box;margin:0 auto;padding:50px 40px;font-family:Arial,sans-serif;font-size:21px;line-height:1.65;color:#111;text-align:center;background:white;',
  h1:    'font-size:34px;font-weight:bold;margin-bottom:28px;',
  hint:  'margin-top:40px;font-size:17px;color:#555;',
  good:  'color:green;font-weight:bold;',
  bad:   'color:red;font-weight:bold;',
};

function _instrPage(title, body) {
  return `<div style="${S.wrap}">
    <h1 style="${S.h1}">${title}</h1>
    ${body}
  </div>`;
}

/** Single-page instruction screen with clickable Back / Continue buttons. */
function instrScreen(title, body) {
  return {
    type:                  jsPsychInstructions,
    pages:                 [_instrPage(title, body)],
    show_clickable_nav:    true,
    button_label_previous: '← Back',
    button_label_next:     'Continue →',
    show_page_number:      false,
    key_forward:           ' ',
  };
}

/** Multi-page instruction block — participant can freely go back and forward.
 *  Pass pairs of [title, body] strings. */
function instrScreenGroup(...pages) {
  return {
    type:                  jsPsychInstructions,
    pages:                 pages.map(([t, b]) => _instrPage(t, b)),
    show_clickable_nav:    true,
    button_label_previous: '← Back',
    button_label_next:     'Continue →',
    show_page_number:      true,
    key_forward:           ' ',
  };
}


// ══════════════════════════════════════════════════════════════════════════════
//  JSPSYCH INIT
// ══════════════════════════════════════════════════════════════════════════════

const jsPsych = initJsPsych({
  on_finish: function () {
    // cognition.run saves data automatically — no manual POST needed.
    // Redirect the participant back to Prolific.
    window.location.href =
      'https://app.prolific.com/submissions/complete?cc=C16L4ZX1';
  },
});


// Attach participant-level fields to every trial row
jsPsych.data.addProperties({
  prolific_pid:     PROLIFIC_PID,
  study_id:         PROLIFIC_STUDY_ID,
  session_id:       PROLIFIC_SESSION,
  arrows_position:  ARROWS_POSITION,
  left_dot_color:   getLeftDotColor(),
  left_keep_change: getLeftKeepChange(),
  rating_type:      CFG.RATING_TYPE,
});


// ══════════════════════════════════════════════════════════════════════════════
//  EXPERIMENT TIMELINE
// ══════════════════════════════════════════════════════════════════════════════

// ── Comprehension check state ─────────────────────────────────────
let comprehensionPassed = false;

// ── Build all trial lists at page load ────────────────────────────
// Test trial structures (colours, agree/disagree, difficulty label) are fixed
// here.  The actual dot intensity is resolved at runtime inside DotPlugin by
// reading STATE.difficulties, which is populated by the call-function that
// runs right after the pretest.  Building upfront is required so jsPsych can
// see non-empty arrays when it initialises the timeline.
const pretestTrials    = buildPretestTrials();
const controlTrials    = buildTestTrials('control');
const confidenceTrials = buildTestTrials('confidence');

const timeline = [

  // ── 0. Full-screen prompt ────────────────────────────────────────
  {
    type:         jsPsychFullscreen,
    fullscreen_mode: true,
    message:      `<div style="${S.wrap}">
      <h1>Full-screen mode</h1>
      <p>This experiment must be run in full-screen.<br>
         Click the button below to continue.</p>
    </div>`,
    button_label: 'Go full-screen',
  },

  // ── 1. Consent form ─────────────────────────────────────────────
  {
    type:     jsPsychHtmlButtonResponse,
    stimulus: `<div style="${S.wrap}">
      <h1>Informed Consent</h1>
      <p>You are about to take part in a study on visual perception and
         decision-making. The task takes approximately <strong>45 minutes</strong>.</p>
      <p>Your participation is voluntary. You may withdraw at any time by
         closing the browser, but you will not receive payment if you do so.</p>
      <p>All data are collected anonymously and will be used for research
         purposes only.</p>
      <p>By clicking <strong>I agree</strong> you confirm that you have read
         and understood this information and consent to participate.</p>
    </div>`,
    choices: ['I agree'],
  },

  // ── 2 + 3. Welcome + dot-task instructions (grouped — participant can go back) ──
  instrScreenGroup(
    ['Welcome', `
      <p>In this experiment, you will see a circle filled with
         <strong style="color:${CFG.COLOR_RED}">RED</strong> and
         <strong style="color:${CFG.COLOR_BLUE}">BLUE</strong> dots.</p>
      <p>Your task is to decide whether there are more
         <strong style="color:${CFG.COLOR_RED}">RED</strong> or
         <strong style="color:${CFG.COLOR_BLUE}">BLUE</strong> dots.</p>
      <p>Use the <strong>← LEFT</strong> and <strong>→ RIGHT</strong> arrow
         keys to respond.</p>
    `],
    ['How to respond', `
      <p>Each trial begins with a fixation cross (<strong>+</strong>).</p>
      <p>The dots then appear briefly — they will disappear after
         <strong>half a second</strong>, so pay close attention!</p>
      <p>Press ← or → as quickly and accurately as possible.
         You can respond <strong>while the dots are still visible</strong>
         — you do not have to wait for them to disappear.</p>
      <p>There is no time limit shown — but if you take more than
         <strong>7 seconds</strong> the trial will be skipped.</p>
      <p>Occasionally, some trials will be noticeably easier than others.
         Please try to answer as accurately as possible on <strong>every single trial</strong>.</p>
    `],
  ),

  // ── 4. Interactive dot demo ──────────────────────────────────────
  // Participant must get at least one trial correct before proceeding.
  (() => {
    let demoPassed = false;
    return {
      timeline: [
        // Demo dot trial — large difference (80) so colours are obvious;
        // dots stay on screen for 7 s so the participant can study them.
        {
          type:            DotPlugin,
          correctColor:    () => Math.random() < 0.5 ? 'blue' : 'red',
          questDriven:     false,
          difficulty:      'easy',
          dotsDuration:    7000,
          agreeOrDisagree: null,
          trialType:       'demo',
        },
        // Feedback
        {
          type: jsPsychHtmlKeyboardResponse,
          stimulus: function () {
            const last = jsPsych.data.get().last(1).values()[0];
            if (last && !last.timeout && last.accuracy === 1) {
              demoPassed = true;
              return `<div style="${S.wrap}">
                <h1 style="${S.good}">✓ Correct!</h1>
                <p>Well done. Now we will practice with dots that
                   disappear quickly.</p>
                <p style="${S.hint}">Press <strong>SPACE</strong> to continue.</p>
              </div>`;
            }
            return `<div style="${S.wrap}">
              <h1 style="${S.bad}">✗ Incorrect — try again</h1>
              <p>Look carefully at whether there are more
                 <strong style="color:${CFG.COLOR_RED}">RED</strong> or
                 <strong style="color:${CFG.COLOR_BLUE}">BLUE</strong> dots,
                 then press the matching arrow.</p>
              <p style="${S.hint}">Press <strong>SPACE</strong> to try again.</p>
            </div>`;
          },
          choices: [' '],
        },
      ],
      loop_function: () => !demoPassed,
    };
  })(),

  // ── 5. Pretest instructions ──────────────────────────────────────
  instrScreen('Training phase', `
    <p>Now the dots will only be visible for <strong>half a second</strong>.</p>
    <p>Try to respond as <strong>quickly</strong> and
       <strong>accurately</strong> as possible.</p>
  `),

  // ── 6. Pretest (150 trials: 100 adaptive + 50 spread) ────────────
  {
    timeline: pretestTrials,
    on_start: function () {
      STATE.q        = new QuestPlus();
      STATE.trialNum = 0;
      document.body.style.cursor = 'none';
    },
  },

  // ── 7. Log calibrated estimates after pretest ─────────────────────
  {
    type: jsPsychCallFunction,
    func: function () {
      const TARGET_P = { easy: CFG.TARGET_P_EASY, medium: CFG.TARGET_P_MEDIUM, hard: CFG.TARGET_P_HARD };
      const diffs = STATE.q.getDifficulties();
      if (diffs) {
        for (const diff of ['easy', 'medium', 'hard']) {
          const x = diffs[diff];
          const pred = (STATE.q._expectedAccuracy(STATE.q.intensities.indexOf(x)) * 100).toFixed(1);
          console.log(`[QUEST+] After pretest — ${diff} (target ${Math.round(TARGET_P[diff] * 100)}%): intensity ${x} dots  (predicted accuracy ${pred}%)`);
        }
        const distinct = new Set([diffs.easy, diffs.medium, diffs.hard]).size === 3;
        const ordered  = diffs.hard < diffs.medium && diffs.medium < diffs.easy;
        console.log(`[QUEST+] Difficulty levels distinct & ordered? ${distinct && ordered}  (hard=${diffs.hard}, medium=${diffs.medium}, easy=${diffs.easy})`);
      } else {
        console.warn('[QUEST+] getDifficulties() returned null — falling back to adaptive stimuli.');
      }
      const { alpha, beta } = STATE.q.getPosteriorMeans();
      console.log(`[QUEST+] Posterior means — α (threshold): ${alpha.toFixed(2)}   β (slope): ${beta.toFixed(2)}`);
      console.log(`[QUEST+] Prior means would be — α: ${((1 + 100) / 2).toFixed(2)}   β: ${((1 + 9) / 2).toFixed(2)}`);
    },
  },

  // ── 8. Control block instructions ───────────────────────────────
  { type: jsPsychCallFunction, func: function () { document.body.style.cursor = ''; } },
  instrScreen('New phase:', `
    <p>From now on, after your initial decision, you will see additional
       information: the response of <strong>a participant from a previous
       study</strong> who saw the exact same cloud of dots as you.</p>
    <p>You can then either <strong>KEEP</strong> your original answer or
       <strong>CHANGE</strong> it to the other colour.</p>
    <p>Use the <strong>← LEFT</strong> and <strong>→ RIGHT</strong> arrow
       keys to keep or change — the labels will always be shown on screen.</p>
  `),

  // ── 9. Comprehension check (loop until correct) ──────────────────
  // Uses html-keyboard-response with choices embedded in the stimulus so
  // jsPsych's button renderer — which causes layout issues on cognition.run —
  // is avoided entirely. Participant presses A, B, or C.
  (() => {
    comprehensionPassed = false;
    let lastAnswer      = null;

    const OPT = 'margin:12px 0;padding:14px 20px;border:2px solid #ccc;border-radius:8px;background:#f5f5f5;cursor:default;text-align:left;';

    const question = {
      type:     jsPsychHtmlKeyboardResponse,
      stimulus: `<div style="${S.wrap}">
        <h1 style="${S.h1}">Comprehension check</h1>
        <p>After giving your initial answer, what happens next?</p>
        <div style="max-width:620px;margin:28px auto 0;font-size:19px;">
          <div style="${OPT}"><strong>A</strong> &nbsp;— The experiment moves straight to the next trial</div>
          <div style="${OPT}"><strong>B</strong> &nbsp;— You see another participant's answer and can keep or change your original answer</div>
          <div style="${OPT}"><strong>C</strong> &nbsp;— You must always change your answer</div>
        </div>
        <p style="${S.hint}">Press <strong>A</strong>, <strong>B</strong> or <strong>C</strong> on your keyboard.</p>
      </div>`,
      choices:   ['a', 'b', 'c'],
      on_finish: function (data) { lastAnswer = data.response; },
    };

    const feedback = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function () {
        if (lastAnswer === 'b') {        // B = correct answer
          comprehensionPassed = true;
          return `<div style="${S.wrap}">
            <h1 style="${S.good}">Correct!</h1>
            <p>After your initial decision, you will see another participant's
               response. You can then freely <strong>keep</strong> or
               <strong>change</strong> your original answer.</p>
            <p>For example: if you initially chose
               <strong style="color:${CFG.COLOR_RED}">RED</strong> and then
               click <strong>CHANGE</strong>, your new answer becomes
               <strong style="color:${CFG.COLOR_BLUE}">BLUE</strong> —
               meaning you now think there are more
               <strong style="color:${CFG.COLOR_BLUE}">BLUE</strong> dots.
               If you click <strong>KEEP</strong>, your answer stays
               <strong style="color:${CFG.COLOR_RED}">RED</strong>.</p>
            <p style="${S.hint}">Press <strong>SPACE</strong> to begin.</p>
          </div>`;
        }
        return `<div style="${S.wrap}">
          <h1 style="${S.bad}">Incorrect — please read carefully</h1>
          <p>After your initial dot decision, you will see the response of
             another participant who saw the same dots. You can then freely
             choose to <strong>keep</strong> your original answer or
             <strong>change</strong> it to the other colour.</p>
          <p>For example: if you initially chose
             <strong style="color:${CFG.COLOR_RED}">RED</strong> and then
             click <strong>CHANGE</strong>, your new answer becomes
             <strong style="color:${CFG.COLOR_BLUE}">BLUE</strong> —
             meaning you now think there are more
             <strong style="color:${CFG.COLOR_BLUE}">BLUE</strong> dots.
             If you click <strong>KEEP</strong>, your answer stays
             <strong style="color:${CFG.COLOR_RED}">RED</strong>.</p>
          <p style="${S.hint}">Press <strong>SPACE</strong> to try again.</p>
        </div>`;
      },
      choices: [' '],
    };

    return {
      timeline: [question, feedback],
      loop_function: () => !comprehensionPassed,
    };
  })(),

  // ── 10. Loading spinner ──────────────────────────────────────────
  makeSpinnerTrial(),

  // ── 11. Control block  (240 trials) ─────────────────────────────
  // Reset attention counters so pretest keypresses don't carry over.
  { type: jsPsychCallFunction, func: function () { resetAttention(); document.body.style.cursor = 'none'; } },
  { timeline: controlTrials },

  // ── 12. Confidence block instructions ───────────────────────────
  { type: jsPsychCallFunction, func: function () { document.body.style.cursor = ''; } },
  instrScreen('New phase: rating your confidence', `
    <p>The rules are exactly the same as before, but now you will also
       rate your <strong>confidence</strong> after each initial decision.</p>
    <p>A vertical slider will appear. Move your mouse to the position
       that best reflects your confidence level — from
       <em>Not at all confident</em> at the bottom to
       <em>Very confident</em> at the top — then <strong>click</strong>
       to confirm.</p>
  `),

  // ── 13. Confidence block  (240 trials) ──────────────────────────
  // Reset attention counters between blocks.
  { type: jsPsychCallFunction, func: function () { resetAttention(); document.body.style.cursor = 'none'; } },
  { timeline: confidenceTrials },

  // ── 14. Qualitative questions ────────────────────────────────────
  { type: jsPsychCallFunction, func: function () { document.body.style.cursor = ''; } },
  {
    type: jsPsychSurveyText,
    questions: [
      {
        prompt:    'Was anything unclear or confusing during the experiment?',
        name:      'q_clarity',
        rows:      4,
        columns:   60,
        required:  false,
        placeholder: 'Please share any thoughts here (you can leave this blank).',
      },
      {
        prompt:    'Did you experience any technical problems during the experiment (e.g. screen freezing, slow responses)?',
        name:      'q_technical',
        rows:      4,
        columns:   60,
        required:  false,
        placeholder: 'Please share any thoughts here (you can leave this blank).',
      },
    ],
    button_label: 'Continue',
    data: { trial_label: 'qualitative_questions' },
  },

  // ── 15. External mouse question ──────────────────────────────────
  {
    type:     jsPsychHtmlButtonResponse,
    stimulus: `<div style="${S.wrap}">
      <h1>One last question</h1>
      <p>Are you using an external mouse (i.e. not a trackpad)?</p>
    </div>`,
    choices:  ['Yes, external mouse', 'No, trackpad / built-in'],
    data:     { trial_label: 'mouse_question' },
    on_finish: function (data) {
      jsPsych.data.addProperties({ external_mouse: data.response === 0 });
    },
  },

  // ── 16. Debrief ─────────────────────────────────────────────────
  {
    type:     jsPsychHtmlButtonResponse,
    stimulus: `<div style="${S.wrap}">
      <h1>Debrief</h1>
      <p><strong>Thank you for participating!</strong></p>
      <p>In this experiment, the "other participant's decision" was
         <em>not</em> from a real person — it was generated by the
         computer to be either the same as or opposite to your response.</p>
      <p>We are studying how people integrate social information when
         updating their perceptual decisions, and whether confidence
         ratings influence this process.</p>
      <p>If you have any questions, please contact the research team.</p>
      <p>Click the button below to submit your responses and return to
         Prolific.</p>
    </div>`,
    choices: ['Submit and return to Prolific'],
  },

]; // end timeline
